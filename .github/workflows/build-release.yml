name: Build Release Packages

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g., v1.0.0)'
        required: true

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: windows-latest
            platform: windows
            arch: x86_64
          - os: macos-latest
            platform: macos
            arch: arm64
          - os: ubuntu-latest
            platform: linux
            arch: x86_64

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build with PyInstaller (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          python package.py --clean

      - name: Build with PyInstaller (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          python3 package.py --clean

      - name: Build with PyInstaller (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          python3 package.py --clean

      - name: Compress release (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          cd releases
          Get-ChildItem -Directory | ForEach-Object {
            if ($_.Name -match "Windows") {
              Compress-Archive -Path $_.FullName -DestinationPath "$($_.Name).zip" -Force
            }
          }

      - name: Compress release (macOS/Linux)
        if: matrix.os != 'windows-latest'
        run: |
          cd releases
          for dir in */; do
            if [[ "$dir" == *"macOS"* ]] || [[ "$dir" == *"Linux"* ]]; then
              zip -r "${dir%/}.zip" "$dir"
            fi
          done

      - name: Upload to Release
        uses: softprops/action-gh-release@v1
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: releases/*.zip
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifacts (workflow dispatch)
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v3
        with:
          name: release-${{ matrix.platform }}-${{ matrix.arch }}
          path: releases/
          retention-days: 7
