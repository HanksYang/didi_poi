<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DiDi 司机热点系统</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        .header p {
            font-size: 1.1em;
            opacity: 0.9;
        }

        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            background: rgba(255, 255, 255, 0.1);
            padding: 10px;
            border-radius: 10px;
            flex-wrap: wrap;
        }

        .tab-btn {
            padding: 12px 24px;
            border: none;
            background: rgba(255, 255, 255, 0.2);
            color: white;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1em;
            transition: all 0.3s;
        }

        .tab-btn:hover {
            background: rgba(255, 255, 255, 0.3);
        }

        .tab-btn.active {
            background: white;
            color: #667eea;
            font-weight: bold;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        .card {
            background: white;
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            margin-bottom: 20px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #333;
        }

        input, select, textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 1em;
            transition: border-color 0.3s;
        }

        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: #667eea;
        }

        .file-upload {
            border: 2px dashed #667eea;
            border-radius: 8px;
            padding: 40px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            background: #f8f9ff;
        }

        .file-upload:hover {
            background: #f0f2ff;
        }

        .file-upload.drag-over {
            background: #e8ebff;
            border-color: #764ba2;
        }

        .button-group {
            display: flex;
            gap: 10px;
            margin-top: 20px;
            flex-wrap: wrap;
        }

        button {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-size: 1em;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            flex: 1;
            min-width: 150px;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        .btn-secondary {
            background: #f0f0f0;
            color: #333;
            flex: 1;
            min-width: 150px;
        }

        .btn-secondary:hover {
            background: #e0e0e0;
        }

        .result-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 10px;
            margin: 15px 0;
        }

        .result-item {
            margin: 10px 0;
            padding: 10px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 5px;
        }

        .diagnosis-section {
            margin-top: 20px;
        }

        .issues {
            background: #fff3cd;
            border-left: 4px solid #ffc107;
            padding: 15px;
            border-radius: 5px;
            margin: 10px 0;
        }

        .suggestions {
            background: #d4edda;
            border-left: 4px solid #28a745;
            padding: 15px;
            border-radius: 5px;
            margin: 10px 0;
        }

        .error {
            background: #f8d7da;
            border-left: 4px solid #dc3545;
            padding: 15px;
            border-radius: 5px;
            margin: 10px 0;
        }

        .success {
            background: #d4edda;
            border-left: 4px solid #28a745;
            padding: 15px;
            border-radius: 5px;
            margin: 10px 0;
        }

        .route-card {
            background: #f8f9fa;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            padding: 15px;
            margin: 10px 0;
            cursor: pointer;
            transition: all 0.3s;
        }

        .route-card:hover {
            border-color: #667eea;
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.2);
        }

        .route-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .route-title {
            font-weight: bold;
            color: #333;
            font-size: 1.1em;
        }

        .route-tag {
            background: #667eea;
            color: white;
            padding: 5px 10px;
            border-radius: 5px;
            font-size: 0.9em;
        }

        .route-details {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 10px;
            margin: 10px 0;
        }

        .detail-item {
            font-size: 0.9em;
            color: #666;
        }

        .detail-label {
            font-weight: 600;
            color: #333;
        }

        .map-preview {
            width: 100%;
            height: 400px;
            border-radius: 8px;
            margin-top: 20px;
            border: 2px solid #e0e0e0;
        }

        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .poi-dropdown {
            position: relative;
            margin-top: 5px;
        }

        .poi-list {
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            background: white;
            border: 1px solid #e0e0e0;
            border-top: none;
            border-radius: 0 0 8px 8px;
            max-height: 200px;
            overflow-y: auto;
            display: none;
            z-index: 1000;
        }

        .poi-list.show {
            display: block;
        }

        .poi-item {
            padding: 10px;
            cursor: pointer;
            border-bottom: 1px solid #f0f0f0;
        }

        .poi-item:hover {
            background: #f8f9ff;
        }

        .poi-score {
            float: right;
            color: #667eea;
            font-weight: bold;
        }

        @media (max-width: 768px) {
            .header h1 {
                font-size: 1.8em;
            }

            .card {
                padding: 20px;
            }

            .route-details {
                grid-template-columns: 1fr 1fr;
            }

            .tabs {
                flex-direction: column;
            }

            .tab-btn {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🚀 DiDi 司机热点系统</h1>
            <p>智能热力图识别 + 路线规划</p>
        </div>

        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('upload')">📤 热力图上传</button>
            <button class="tab-btn" onclick="switchTab('route')">🗺️ 路线规划</button>
            <button class="tab-btn" onclick="switchTab('settings')">⚙️ 设置</button>
        </div>

        <!-- Tab 1: 热力图上传 -->
        <div id="upload" class="tab-content active">
            <div class="card">
                <h2>📤 上传热力图</h2>
                <p style="color: #666; margin-bottom: 20px;">上传高德地图截图或热力图文件，系统会自动识别接单热点</p>

                <div class="form-group">
                    <div class="file-upload" id="fileUpload" onclick="document.getElementById('fileInput').click()">
                        <div style="font-size: 2em; margin-bottom: 10px;">📁</div>
                        <p id="uploadText">拖拽文件或点击选择</p>
                        <p style="font-size: 0.9em; color: #999; margin-top: 5px;">支持 JPG、PNG、GIF 格式</p>
                        <input type="file" id="fileInput" style="display: none;" onchange="handleFiles(event)">
                    </div>
                </div>

                <div class="form-group">
                    <label>时段选择</label>
                    <select id="period">
                        <option value="auto">自动检测</option>
                        <option value="morning">早高峰（7-9点）</option>
                        <option value="daytime">白天（10-16点）</option>
                        <option value="evening">晚高峰（17-20点）</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>热度衰减范围（km）</label>
                    <select id="sigma">
                        <option value="1.0">1km</option>
                        <option value="2.0">2km</option>
                        <option value="3.0" selected>3km</option>
                        <option value="5.0">5km</option>
                    </select>
                </div>

                <div class="button-group">
                    <button class="btn-secondary" onclick="diagnoseImage()">🔍 图像诊断</button>
                    <button class="btn-primary" onclick="submitUpload()">🚀 提交识别</button>
                </div>

                <div id="diagnosisResult"></div>
                <div id="uploadResult"></div>
            </div>
        </div>

        <!-- Tab 2: 路线规划 -->
        <div id="route" class="tab-content">
            <div class="card">
                <h2>🗺️ 路线规划</h2>
                <p style="color: #666; margin-bottom: 20px;">输入起点和终点，系统推荐最优接单路线</p>

                <div class="form-group">
                    <label>城市选择</label>
                    <select id="city">
                        <option value="beijing">北京</option>
                        <option value="shanghai">上海</option>
                        <option value="guangzhou">广州</option>
                        <option value="shenzhen">深圳</option>
                        <option value="chengdu">成都</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>起点</label>
                    <input type="text" id="start" placeholder="输入地点名称或坐标" oninput="showPoiList('start')">
                    <div class="poi-dropdown">
                        <div class="poi-list" id="startPoiList"></div>
                    </div>
                </div>

                <div class="form-group">
                    <label>终点</label>
                    <input type="text" id="end" placeholder="输入地点名称或坐标" oninput="showPoiList('end')">
                    <div class="poi-dropdown">
                        <div class="poi-list" id="endPoiList"></div>
                    </div>
                </div>

                <div class="button-group">
                    <button class="btn-primary" onclick="planRoute()">📍 规划路线</button>
                </div>

                <div id="routeResult"></div>
            </div>
        </div>

        <!-- Tab 3: 设置 -->
        <div id="settings" class="tab-content">
            <div class="card">
                <h2>⚙️ API 配置</h2>
                <p style="color: #666; margin-bottom: 20px;">配置高德地图和火山引擎 API Key</p>

                <div class="form-group">
                    <label>高德地图 API Key</label>
                    <input type="password" id="amapKey" placeholder="输入高德地图 API Key">
                    <button class="btn-secondary" style="margin-top: 10px;" onclick="window.open('https://lbs.amap.com/api', '_blank')">🔗 申请 Key</button>
                </div>

                <div class="form-group">
                    <label>火山引擎 API Key</label>
                    <input type="password" id="volcKey" placeholder="输入火山引擎 API Key">
                    <button class="btn-secondary" style="margin-top: 10px;" onclick="window.open('https://console.volcengine.com/ark', '_blank')">🔗 申请 Key</button>
                </div>

                <div class="button-group">
                    <button class="btn-primary" onclick="saveConfig()">💾 保存密钥</button>
                    <button class="btn-secondary" onclick="loadConfig()">🔄 重新加载</button>
                </div>

                <div id="configResult"></div>
            </div>
        </div>
    </div>

    <script>
        let selectedFile = null;
        let poiList = [];

        function switchTab(tab) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
            document.getElementById(tab).classList.add('active');
            event.target.classList.add('active');
        }

        // 文件上传处理
        const fileUpload = document.getElementById('fileUpload');
        fileUpload.addEventListener('dragover', (e) => {
            e.preventDefault();
            fileUpload.classList.add('drag-over');
        });

        fileUpload.addEventListener('dragleave', () => {
            fileUpload.classList.remove('drag-over');
        });

        fileUpload.addEventListener('drop', (e) => {
            e.preventDefault();
            fileUpload.classList.remove('drag-over');
            handleFiles({dataTransfer: e.dataTransfer});
        });

        function handleFiles(e) {
            const files = e.dataTransfer ? e.dataTransfer.files : e.target.files;
            if (files.length > 0) {
                selectedFile = files[0];
                document.getElementById('uploadText').textContent = `✓ 已选择: ${selectedFile.name}`;
            }
        }

        function diagnoseImage() {
            if (!selectedFile) {
                alert('请先选择文件');
                return;
            }

            const formData = new FormData();
            formData.append('image', selectedFile);

            const resultDiv = document.getElementById('diagnosisResult');
            resultDiv.innerHTML = '<div class="loading"></div> 诊断中...';

            fetch('/api/diagnose', {
                method: 'POST',
                body: formData
            })
            .then(r => r.json())
            .then(data => {
                if (data.success && data.diagnosis) {
                    const diag = data.diagnosis;
                    let html = '<div class="diagnosis-section"><h3>📊 诊断报告</h3>';

                    if (diag.issues && diag.issues.length > 0) {
                        html += '<div class="issues"><strong>⚠️ 检测到问题：</strong><ul>';
                        diag.issues.forEach(issue => html += `<li>${issue}</li>`);
                        html += '</ul></div>';
                    }

                    html += '<div style="background: #f0f7ff; padding: 15px; border-radius: 5px; margin: 10px 0;">';
                    html += `<strong>📈 图像指标：</strong><br>`;
                    html += `分辨率: ${diag.size}<br>`;
                    html += `文件大小: ${diag.file_size_mb}MB<br>`;
                    html += `对比度: ${diag.contrast}<br>`;
                    html += `热点像素: ${diag.hot_pixels_percentage}%`;
                    html += '</div>';

                    if (diag.suggestions && diag.suggestions.length > 0) {
                        html += '<div class="suggestions"><strong>✅ 改进建议：</strong><ul>';
                        diag.suggestions.forEach(sug => html += `<li>${sug}</li>`);
                        html += '</ul></div>';
                    }

                    html += '</div>';
                    resultDiv.innerHTML = html;
                } else {
                    resultDiv.innerHTML = `<div class="error">❌ 诊断失败: ${data.error || '未知错误'}</div>`;
                }
            })
            .catch(err => {
                resultDiv.innerHTML = `<div class="error">❌ 错误: ${err.message}</div>`;
            });
        }

        function submitUpload() {
            if (!selectedFile) {
                alert('请先选择文件');
                return;
            }

            const formData = new FormData();
            formData.append('image', selectedFile);
            formData.append('period', document.getElementById('period').value);
            formData.append('sigma', document.getElementById('sigma').value);

            const resultDiv = document.getElementById('uploadResult');
            resultDiv.innerHTML = '<div class="loading"></div> 识别中...';

            fetch('/api/upload', {
                method: 'POST',
                body: formData
            })
            .then(r => r.json())
            .then(data => {
                if (data.success) {
                    let html = '<div class="success"><strong>✅ 识别成功！</strong><br>';
                    html += `新增 POI: ${data.inserted}<br>`;
                    html += `更新 POI: ${data.updated_pois}<br>`;
                    html += `地点数: ${data.places_count}<br>`;
                    html += `热度中心: ${data.heat_center.name} (${data.heat_center.lat}, ${data.heat_center.lng})`;
                    html += '</div>';
                    resultDiv.innerHTML = html;
                    document.getElementById('uploadText').textContent = '拖拽文件或点击选择';
                    selectedFile = null;
                } else {
                    let html = `<div class="error"><strong>❌ ${data.error}</strong>`;
                    if (data.detail) html += `<br>${data.detail}`;
                    if (data.diagnosis && data.diagnosis.suggestions) {
                        html += '<br><strong>改进建议：</strong><ul>';
                        data.diagnosis.suggestions.forEach(sug => html += `<li>${sug}</li>`);
                        html += '</ul>';
                    }
                    html += '</div>';
                    resultDiv.innerHTML = html;
                }
            })
            .catch(err => {
                resultDiv.innerHTML = `<div class="error">❌ 错误: ${err.message}</div>`;
            });
        }

        function loadPois() {
            fetch('/api/pois')
            .then(r => r.json())
            .then(data => {
                poiList = data.pois || [];
            });
        }

        function showPoiList(field) {
            const input = document.getElementById(field);
            const listDiv = document.getElementById(field + 'PoiList');
            const keyword = input.value.toLowerCase();

            if (!keyword) {
                listDiv.classList.remove('show');
                return;
            }

            const filtered = poiList.filter(p => p.name.toLowerCase().includes(keyword)).slice(0, 5);

            if (filtered.length === 0) {
                listDiv.classList.remove('show');
                return;
            }

            listDiv.innerHTML = filtered.map(p => 
                `<div class="poi-item" onclick="selectPoi('${field}', '${p.name}')">
                    ${p.name}
                    <span class="poi-score">${p.heat_score}</span>
                </div>`
            ).join('');

            listDiv.classList.add('show');
        }

        function selectPoi(field, name) {
            document.getElementById(field).value = name;
            document.getElementById(field + 'PoiList').classList.remove('show');
        }

        function planRoute() {
            const start = document.getElementById('start').value.trim();
            const end = document.getElementById('end').value.trim();
            const city = document.getElementById('city').value;

            if (!start || !end) {
                alert('请输入起点和终点');
                return;
            }

            const resultDiv = document.getElementById('routeResult');
            resultDiv.innerHTML = '<div class="loading"></div> 规划中...';

            fetch('/api/route/plan', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({start, end, city})
            })
            .then(r => r.json())
            .then(data => {
                if (data.success && data.routes) {
                    let html = `<h3>📍 ${data.start_name} → ${data.end_name}</h3>`;
                    
                    data.routes.forEach((route, idx) => {
                        html += `<div class="route-card">
                            <div class="route-header">
                                <span class="route-title">路线 ${idx + 1}</span>
                                <span class="route-tag">热度效率: ${(route.heat_efficiency * 100).toFixed(1)}%</span>
                            </div>
                            <div class="route-details">
                                <div class="detail-item">
                                    <span class="detail-label">热度总和</span><br>${route.heat_score_sum.toFixed(2)}
                                </div>
                                <div class="detail-item">
                                    <span class="detail-label">距离</span><br>${(route.distance / 1000).toFixed(1)}km
                                </div>
                                <div class="detail-item">
                                    <span class="detail-label">时长</span><br>${Math.round(route.duration / 60)}分钟
                                </div>
                            </div>
                            <div style="margin-top: 10px; font-size: 0.9em; color: #666;">
                                <strong>途经：</strong> ${route.waypoints.map(w => `${w.name}(${w.heat_score})`).join(' → ')}
                            </div>
                        </div>`;
                    });

                    resultDiv.innerHTML = html;
                } else {
                    resultDiv.innerHTML = `<div class="error">❌ ${data.error || '规划失败'}</div>`;
                }
            })
            .catch(err => {
                resultDiv.innerHTML = `<div class="error">❌ 错误: ${err.message}</div>`;
            });
        }

        function saveConfig() {
            const amapKey = document.getElementById('amapKey').value.trim();
            const volcKey = document.getElementById('volcKey').value.trim();
            const resultDiv = document.getElementById('configResult');

            if (!amapKey || !volcKey) {
                resultDiv.innerHTML = '<div class="error">❌ API Key 不能为空</div>';
                return;
            }

            fetch('/api/config', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({amap_key: amapKey, volc_key: volcKey})
            })
            .then(r => r.json())
            .then(data => {
                if (data.success) {
                    resultDiv.innerHTML = '<div class="success">✅ 配置已保存</div>';
                } else {
                    resultDiv.innerHTML = `<div class="error">❌ ${data.error}</div>`;
                }
            })
            .catch(err => {
                resultDiv.innerHTML = `<div class="error">❌ 错误: ${err.message}</div>`;
            });
        }

        function loadConfig() {
            fetch('/api/config')
            .then(r => r.json())
            .then(data => {
                if (data.amap_key) document.getElementById('amapKey').value = data.amap_key;
                if (data.volc_key) document.getElementById('volcKey').value = data.volc_key;
            });
        }

        // 初始化
        loadPois();
        loadConfig();
    </script>
</body>
</html>
